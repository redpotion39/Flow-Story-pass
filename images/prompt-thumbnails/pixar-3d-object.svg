<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pixarObjBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#pixarObjBg)"/>
  <!-- Box-shaped object body -->
  <rect x="115" y="30" width="90" height="100" rx="14" fill="#fff" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="145" cy="65" r="10" fill="#333"/>
  <circle cx="175" cy="65" r="10" fill="#333"/>
  <circle cx="148" cy="62" r="4" fill="white"/>
  <circle cx="178" cy="62" r="4" fill="white"/>
  <!-- Worried mouth -->
  <path d="M150 90 Q160 83 170 90" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Arms -->
  <path d="M115 80 L88 95" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <path d="M205 80 L232 95" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <!-- Legs -->
  <path d="M140 130 L133 155" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <path d="M180 130 L187 155" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <!-- Cap/lid detail -->
  <path d="M130 38 L135 28 L140 38" stroke="#06B6D4" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Sparkles -->
  <polygon points="60,40 62,46 68,46 63,50 65,56 60,52 55,56 57,50 52,46 58,46" fill="rgba(255,255,255,0.4)"/>
  <polygon points="270,35 271,39 275,39 272,42 273,46 270,43 267,46 268,42 265,39 269,39" fill="rgba(255,255,255,0.3)"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">3D Cartoon Object</text>
</svg>
