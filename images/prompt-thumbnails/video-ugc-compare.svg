<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052d4"/>
      <stop offset="100%" style="stop-color:#6fb1fc"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg4)"/>
  <!-- Video frame -->
  <rect x="40" y="30" width="240" height="110" rx="8" fill="rgba(0,0,0,0.2)"/>
  <!-- Split screen divider -->
  <line x1="160" y1="35" x2="160" y2="135" stroke="white" stroke-width="3"/>
  <!-- Before side -->
  <text x="100" y="50" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">BEFORE</text>
  <circle cx="100" cy="85" r="25" fill="rgba(255,255,255,0.9)"/>
  <circle cx="92" cy="80" r="3" fill="#666"/>
  <circle cx="108" cy="80" r="3" fill="#666"/>
  <path d="M90 95 Q100 88 110 95" stroke="#666" stroke-width="2" fill="none"/>
  <!-- After side -->
  <text x="220" y="50" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">AFTER</text>
  <circle cx="220" cy="85" r="25" fill="#fff3e0"/>
  <circle cx="212" cy="80" r="3" fill="#333"/>
  <circle cx="228" cy="80" r="3" fill="#333"/>
  <path d="M210 92 Q220 102 230 92" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Sparkle on after side -->
  <polygon points="250,60 251,63 254,63 252,65 253,68 250,66 247,68 248,65 246,63 249,63" fill="#ffd700"/>
  <!-- Timeline bar -->
  <rect x="50" y="125" width="220" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="50" y="125" width="110" height="8" rx="4" fill="white"/>
  <circle cx="160" cy="129" r="6" fill="white" stroke="#0052d4" stroke-width="2"/>
  <!-- Play button -->
  <circle cx="160" cy="85" r="15" fill="rgba(255,255,255,0.9)"/>
  <polygon points="156,78 156,92 169,85" fill="#0052d4"/>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video Compare</text>
</svg>
