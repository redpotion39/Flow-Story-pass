<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg1)"/>
  <!-- Phone frame -->
  <rect x="120" y="15" width="80" height="120" rx="8" fill="rgba(255,255,255,0.9)"/>
  <!-- Person in phone -->
  <circle cx="160" cy="55" r="18" fill="rgba(6,182,212,0.2)"/>
  <circle cx="155" cy="52" r="3" fill="#333"/>
  <circle cx="165" cy="52" r="3" fill="#333"/>
  <path d="M155 62 Q160 68 165 62" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Product in phone -->
  <rect x="145" y="75" width="30" height="35" rx="4" fill="#fbbf24" opacity="0.8"/>
  <!-- Play button -->
  <polygon points="210,70 230,80 210,90" fill="rgba(255,255,255,0.8)"/>
  <!-- Globe icon -->
  <circle cx="75" cy="75" r="22" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <ellipse cx="75" cy="75" rx="10" ry="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="53" y1="75" x2="97" y2="75" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="58" y1="63" x2="92" y2="63" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="58" y1="87" x2="92" y2="87" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Text -->
  <text x="160" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">VIDEO UGC Global</text>
</svg>
