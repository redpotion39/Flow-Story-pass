<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pixarPersonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#pixarPersonBg)"/>
  <!-- 3D Person head -->
  <circle cx="160" cy="60" r="38" fill="#fff" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="145" cy="52" r="10" fill="#333"/>
  <circle cx="175" cy="52" r="10" fill="#333"/>
  <circle cx="148" cy="49" r="4" fill="white"/>
  <circle cx="178" cy="49" r="4" fill="white"/>
  <!-- Worried mouth -->
  <path d="M148 76 Q160 69 172 76" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Body -->
  <ellipse cx="160" cy="118" rx="32" ry="26" fill="#fff" opacity="0.9"/>
  <!-- Arms -->
  <path d="M128 108 L100 120" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M192 108 L220 120" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Question mark -->
  <text x="75" y="50" font-family="Arial" font-size="28" fill="rgba(255,255,255,0.5)" font-weight="bold">?</text>
  <!-- Sparkles -->
  <polygon points="260,30 262,36 268,36 263,40 265,46 260,42 255,46 257,40 252,36 258,36" fill="rgba(255,255,255,0.4)"/>
  <polygon points="55,130 56,133 59,133 57,135 58,138 55,136 52,138 53,135 51,133 54,133" fill="rgba(255,255,255,0.3)"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">3D Cartoon Person</text>
</svg>
