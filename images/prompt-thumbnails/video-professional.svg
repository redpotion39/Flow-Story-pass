  <rect x="45" y="133" width="5" height="9" fill="#232526"/>
  <rect x="53" y="133" width="5" height="9" fill="#232526"/>
  <rect x="255" y="130" width="25" height="15" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="260" y="133" width="5" height="9" fill="#232526"/>
  <rect x="268" y="133" width="5" height="9" fill="#232526"/>
