<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e5e"/>
      <stop offset="100%" style="stop-color:#71b280"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg2)"/>
  <!-- Video frame -->
  <rect x="60" y="30" width="200" height="110" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Hand holding product -->
  <ellipse cx="130" cy="100" rx="30" ry="25" fill="rgba(255,220,190,0.9)"/>
  <!-- Product being used -->
  <rect x="145" y="55" width="50" height="70" rx="6" fill="white"/>
  <rect x="150" y="50" width="40" height="15" rx="4" fill="#71b280"/>
  <rect x="155" y="75" width="30" height="35" rx="3" fill="#e8f5e9"/>
  <!-- Action lines showing usage -->
  <path d="M200 70 Q220 60 230 70" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none"/>
  <path d="M200 85 Q225 75 235 85" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none"/>
  <path d="M200 100 Q220 95 228 100" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none"/>
  <!-- Play button -->
  <circle cx="100" cy="85" r="15" fill="rgba(255,255,255,0.9)"/>
  <polygon points="96,78 96,92 108,85" fill="#134e5e"/>
  <!-- Timer -->
  <rect x="225" y="120" width="30" height="15" rx="3" fill="rgba(0,0,0,0.5)"/>
  <text x="240" y="131" font-family="Arial" font-size="9" fill="white" text-anchor="middle">0:15</text>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video Demo</text>
</svg>
