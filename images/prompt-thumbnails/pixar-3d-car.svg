<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pixarCarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#pixarCarBg)"/>
  <!-- Car body -->
  <rect x="70" y="55" width="180" height="65" rx="18" fill="#fff" opacity="0.95"/>
  <!-- Car roof/windshield -->
  <path d="M110 55 Q125 20 160 18 Q195 20 210 55" fill="#fff" opacity="0.9"/>
  <!-- Windows -->
  <rect x="118" y="28" width="35" height="27" rx="5" fill="#87CEEB" opacity="0.7"/>
  <rect x="167" y="28" width="35" height="27" rx="5" fill="#87CEEB" opacity="0.7"/>
  <!-- Eyes (as headlights) -->
  <circle cx="135" cy="48" r="9" fill="#333"/>
  <circle cx="185" cy="48" r="9" fill="#333"/>
  <circle cx="138" cy="45" r="3.5" fill="white"/>
  <circle cx="188" cy="45" r="3.5" fill="white"/>
  <!-- Mouth (bumper smile) -->
  <path d="M145 80 Q160 70 175 80" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Wheels -->
  <circle cx="115" cy="120" r="20" fill="#555"/>
  <circle cx="115" cy="120" r="12" fill="#888"/>
  <circle cx="205" cy="120" r="20" fill="#555"/>
  <circle cx="205" cy="120" r="12" fill="#888"/>
  <!-- Sparkles -->
  <polygon points="55,30 57,36 63,36 58,40 60,46 55,42 50,46 52,40 47,36 53,36" fill="rgba(255,255,255,0.4)"/>
  <polygon points="275,25 276,29 280,29 277,32 278,36 275,33 272,36 273,32 270,29 274,29" fill="rgba(255,255,255,0.3)"/>
  <text x="160" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">3D Cartoon Car</text>
</svg>
