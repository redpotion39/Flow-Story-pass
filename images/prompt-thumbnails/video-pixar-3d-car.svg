<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vPixarCarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#5a1a0e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vPixarCarBg)"/>
  <!-- Video frame -->
  <rect x="85" y="15" width="150" height="130" rx="8" fill="#2d2d44" stroke="#EF4444" stroke-width="2"/>
  <rect x="92" y="25" width="136" height="105" rx="5" fill="#1a1040"/>
  <!-- Car body -->
  <rect x="110" y="55" width="100" height="40" rx="12" fill="#fff" opacity="0.95"/>
  <!-- Car roof -->
  <path d="M130 55 Q140 35 160 33 Q180 35 190 55" fill="#fff" opacity="0.9"/>
  <!-- Windows -->
  <rect x="134" y="40" width="22" height="15" rx="3" fill="#87CEEB" opacity="0.7"/>
  <rect x="164" y="40" width="22" height="15" rx="3" fill="#87CEEB" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="148" cy="50" r="5" fill="#333"/>
  <circle cx="172" cy="50" r="5" fill="#333"/>
  <circle cx="149" cy="49" r="2" fill="#fff"/>
  <circle cx="173" cy="49" r="2" fill="#fff"/>
  <path d="M153 68 Q160 63 167 68" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Wheels -->
  <circle cx="130" cy="95" r="12" fill="#555"/>
  <circle cx="130" cy="95" r="7" fill="#888"/>
  <circle cx="190" cy="95" r="12" fill="#555"/>
  <circle cx="190" cy="95" r="7" fill="#888"/>
  <!-- Play button -->
  <circle cx="160" cy="72" r="16" fill="rgba(239,68,68,0.85)"/>
  <polygon points="155,64 155,80 170,72" fill="#fff"/>
  <!-- Stars -->
  <polygon points="60,40 62,46 68,46 63,50 65,56 60,52 55,56 57,50 52,46 58,46" fill="#F97316"/>
  <polygon points="270,30 271,34 275,34 272,37 273,41 270,38 267,41 268,37 265,34 269,34" fill="#EF4444"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">VIDEO 3D Car</text>
</svg>
