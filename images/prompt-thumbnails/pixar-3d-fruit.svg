<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pixarFruitBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#pixarFruitBg)"/>
  <!-- Orange fruit body -->
  <circle cx="160" cy="75" r="48" fill="#FF8C00" opacity="0.95"/>
  <!-- Leaf stem -->
  <path d="M155 27 Q160 12 165 27" stroke="#22C55E" stroke-width="4" fill="none"/>
  <ellipse cx="160" cy="30" rx="14" ry="7" fill="#22C55E" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="142" cy="65" r="10" fill="#333"/>
  <circle cx="178" cy="65" r="10" fill="#333"/>
  <circle cx="145" cy="62" r="4" fill="white"/>
  <circle cx="181" cy="62" r="4" fill="white"/>
  <!-- Worried mouth -->
  <path d="M150 88 Q160 80 170 88" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Arms -->
  <path d="M112 80 L88 95" stroke="#FF8C00" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <path d="M208 80 L232 95" stroke="#FF8C00" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <!-- Legs -->
  <path d="M142 123 L135 150" stroke="#FF8C00" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <path d="M178 123 L185 150" stroke="#FF8C00" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <!-- Sparkles -->
  <polygon points="60,40 62,46 68,46 63,50 65,56 60,52 55,56 57,50 52,46 58,46" fill="rgba(255,255,255,0.4)"/>
  <polygon points="270,35 271,39 275,39 272,42 273,46 270,43 267,46 268,42 265,39 269,39" fill="rgba(255,255,255,0.3)"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">3D Cartoon Fruit</text>
</svg>
