<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg1)"/>
  <!-- Phone frame -->
  <rect x="115" y="25" width="90" height="130" rx="10" fill="#2d2d44" stroke="#4a4a6a" stroke-width="2"/>
  <rect x="120" y="35" width="80" height="100" rx="5" fill="#0f3460"/>
  <!-- Person silhouette in video -->
  <circle cx="160" cy="65" r="15" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="160" cy="100" rx="20" ry="18" fill="rgba(255,255,255,0.9)"/>
  <!-- Product in hand -->
  <rect x="175" y="85" width="20" height="28" rx="3" fill="#e94560"/>
  <rect x="177" y="82" width="16" height="8" rx="2" fill="white"/>
  <!-- Play button overlay -->
  <circle cx="160" cy="85" r="18" fill="rgba(233,69,96,0.9)"/>
  <polygon points="155,78 155,92 168,85" fill="white"/>
  <!-- Video stats -->
  <rect x="125" y="115" width="35" height="12" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="142" y="124" font-family="Arial" font-size="8" fill="white" text-anchor="middle">12K</text>
  <rect x="165" y="115" width="30" height="12" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="180" y="124" font-family="Arial" font-size="8" fill="white" text-anchor="middle">1K</text>
  <!-- Decorative stars -->
  <polygon points="60,50 62,55 67,55 63,58 65,63 60,60 55,63 57,58 53,55 58,55" fill="#e94560"/>
  <polygon points="260,40 261,43 264,43 262,45 263,48 260,46 257,48 258,45 256,43 259,43" fill="#e94560"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video UGC</text>
</svg>
