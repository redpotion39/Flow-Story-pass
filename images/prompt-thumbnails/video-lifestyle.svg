<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ab2f"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg9)"/>
  <!-- Video frame outdoor scene -->
  <rect x="50" y="25" width="220" height="120" rx="8" fill="rgba(0,0,0,0.15)"/>
  <!-- Sun -->
  <circle cx="250" cy="45" r="18" fill="#fff176"/>
  <line x1="250" y1="22" x2="250" y2="15" stroke="#fff176" stroke-width="2"/>
  <line x1="268" y1="30" x2="273" y2="25" stroke="#fff176" stroke-width="2"/>
  <line x1="273" y1="45" x2="280" y2="45" stroke="#fff176" stroke-width="2"/>
  <!-- Coffee/drink -->
  <rect x="70" y="75" width="35" height="40" rx="4" fill="white"/>
  <ellipse cx="87" cy="75" rx="17" ry="6" fill="white"/>
  <ellipse cx="87" cy="78" rx="12" ry="4" fill="#8d6e63"/>
  <path d="M105 82 Q115 90 105 100" stroke="white" stroke-width="4" fill="none"/>
  <!-- Steam -->
  <path d="M80 62 Q75 52 80 42" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>
  <path d="M90 62 Q95 52 90 42" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>
  <!-- Product in natural setting -->
  <rect x="160" y="55" width="55" height="75" rx="6" fill="white"/>
  <rect x="165" y="50" width="45" height="15" rx="4" fill="#56ab2f"/>
  <rect x="170" y="75" width="35" height="42" rx="3" fill="#e8f5e9"/>
  <!-- Leaf decorations -->
  <ellipse cx="240" cy="100" rx="15" ry="8" fill="#81c784" transform="rotate(-30 240 100)"/>
  <ellipse cx="255" cy="110" rx="12" ry="6" fill="#81c784" transform="rotate(20 255 110)"/>
  <!-- Play button -->
  <circle cx="120" cy="95" r="15" fill="rgba(255,255,255,0.9)"/>
  <polygon points="116,88 116,102 129,95" fill="#56ab2f"/>
  <!-- Timer -->
  <rect x="225" y="125" width="35" height="15" rx="3" fill="rgba(0,0,0,0.4)"/>
  <text x="242" y="136" font-family="Arial" font-size="9" fill="white" text-anchor="middle">0:30</text>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video Lifestyle</text>
</svg>
