  <path d="M145 42 Q138 50 140 62 Q142 74 148 77 Q154 80 160 80 Q166 80 172 77 Q178 74 180 62 Q182 50 175 42 Q169 34 160 33 Q151 34 145 42 Z" fill="#e8847c" opacity="0.95"/>
