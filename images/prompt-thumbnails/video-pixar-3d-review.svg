  <rect x="160" y="118" width="35" height="10" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="177" y="126" font-family="Arial" font-size="7" fill="white" text-anchor="middle">3D</text>
  <!-- Decorative stars -->
  <polygon points="60,45 62,50 67,50 63,53 65,58 60,55 55,58 57,53 53,50 58,50" fill="#F857A6"/>
  <polygon points="260,35 261,38 264,38 262,40 263,43 260,41 257,43 258,40 256,38 259,38" fill="#6C63FF"/>
