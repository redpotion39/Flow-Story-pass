<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg6)"/>
  <!-- Video frame -->
  <rect x="55" y="25" width="210" height="115" rx="8" fill="rgba(0,0,0,0.2)"/>
  <!-- Person pointing -->
  <circle cx="100" cy="55" r="20" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="100" cy="95" rx="25" ry="20" fill="rgba(255,255,255,0.9)"/>
  <!-- Pointing arm -->
  <path d="M120 80 L180 65" stroke="rgba(255,255,255,0.9)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="185" cy="63" r="7" fill="rgba(255,255,255,0.9)"/>
  <!-- Product being recommended -->
  <rect x="195" y="45" width="55" height="75" rx="8" fill="white"/>
  <rect x="200" y="40" width="45" height="15" rx="5" fill="#38ef7d"/>
  <rect x="205" y="65" width="35" height="42" rx="4" fill="#e8f5e9"/>
  <!-- Thumbs up / check badge -->
  <circle cx="260" cy="40" r="15" fill="#4CAF50"/>
  <path d="M252 40 L258 46 L270 34" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Play button -->
  <circle cx="80" cy="115" r="12" fill="rgba(255,255,255,0.9)"/>
  <polygon points="77,109 77,121 87,115" fill="#11998e"/>
  <!-- Stars rating -->
  <polygon points="135,115 137,120 142,120 138,123 139,128 135,125 131,128 132,123 128,120 133,120" fill="#FFD700"/>
  <polygon points="150,115 152,120 157,120 153,123 154,128 150,125 146,128 147,123 143,120 148,120" fill="#FFD700"/>
  <polygon points="165,115 167,120 172,120 168,123 169,128 165,125 161,128 162,123 158,120 163,120" fill="#FFD700"/>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video Recommend</text>
</svg>
