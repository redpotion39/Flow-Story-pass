<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vPixarPerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#3b1f6e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vPixarPerBg)"/>
  <!-- Video frame -->
  <rect x="85" y="15" width="150" height="130" rx="8" fill="#2d2d44" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="92" y="25" width="136" height="105" rx="5" fill="#1a1040"/>
  <!-- 3D Person head -->
  <circle cx="160" cy="58" r="25" fill="#fff" opacity="0.95"/>
  <circle cx="150" cy="52" r="6" fill="#333"/>
  <circle cx="170" cy="52" r="6" fill="#333"/>
  <circle cx="152" cy="50" r="2.5" fill="#fff"/>
  <circle cx="172" cy="50" r="2.5" fill="#fff"/>
  <path d="M153 68 Q160 63 167 68" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Body -->
  <ellipse cx="160" cy="100" rx="20" ry="16" fill="#fff" opacity="0.85"/>
  <!-- Play button -->
  <circle cx="160" cy="78" r="16" fill="rgba(139,92,246,0.85)"/>
  <polygon points="155,70 155,86 170,78" fill="#fff"/>
  <!-- Question mark -->
  <text x="100" y="50" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.4)" font-weight="bold">?</text>
  <!-- Stars -->
  <polygon points="60,40 62,46 68,46 63,50 65,56 60,52 55,56 57,50 52,46 58,46" fill="#EC4899"/>
  <polygon points="270,30 271,34 275,34 272,37 273,41 270,38 267,41 268,37 265,34 269,34" fill="#8B5CF6"/>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">VIDEO 3D Person</text>
</svg>
