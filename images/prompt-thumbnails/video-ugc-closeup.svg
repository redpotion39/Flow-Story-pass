<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e2de2"/>
      <stop offset="100%" style="stop-color:#4a00e0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg5)"/>
  <!-- Video frame -->
  <rect x="60" y="25" width="200" height="115" rx="8" fill="rgba(0,0,0,0.25)"/>
  <!-- Magnifying glass showing product -->
  <circle cx="150" cy="75" r="45" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="4"/>
  <line x1="180" y1="105" x2="215" y2="140" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Product inside magnifier -->
  <rect x="125" y="50" width="50" height="60" rx="6" fill="white"/>
  <rect x="130" y="45" width="40" height="14" rx="4" fill="#8e2de2"/>
  <rect x="135" y="68" width="30" height="32" rx="3" fill="#ede7f6"/>
  <!-- Detail lines -->
  <line x1="220" y1="40" x2="250" y2="30" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="225" y1="55" x2="260" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="220" y1="70" x2="255" y2="70" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Zoom indicator -->
  <rect x="65" y="30" width="40" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="85" y="44" font-family="Arial" font-size="10" fill="white" text-anchor="middle">🔍 2x</text>
  <!-- Play button small -->
  <circle cx="235" cy="120" r="12" fill="rgba(255,255,255,0.9)"/>
  <polygon points="232,114 232,126 242,120" fill="#8e2de2"/>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video Closeup</text>
</svg>
