<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vbg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg8)"/>
  <!-- 360 rotation arrows -->
  <ellipse cx="160" cy="100" rx="70" ry="25" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Rotation arrow heads -->
  <polygon points="90,95 95,105 85,105" fill="rgba(255,255,255,0.5)"/>
  <polygon points="230,105 235,95 225,95" fill="rgba(255,255,255,0.5)"/>
  <!-- Product centered -->
  <rect x="125" y="35" width="70" height="95" rx="8" fill="white"/>
  <rect x="130" y="30" width="60" height="18" rx="5" fill="#3498db"/>
  <rect x="137" y="58" width="46" height="55" rx="4" fill="#ecf0f1"/>
  <!-- 360 badge -->
  <circle cx="250" cy="50" r="20" fill="rgba(255,255,255,0.9)"/>
  <text x="250" y="54" font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">360°</text>
  <!-- Sparkle effects -->
  <polygon points="70,50 72,55 77,55 73,58 75,63 70,60 65,63 67,58 63,55 68,55" fill="rgba(255,255,255,0.6)"/>
  <polygon points="80,90 81,93 84,93 82,95 83,98 80,96 77,98 78,95 76,93 79,93" fill="rgba(255,255,255,0.6)"/>
  <polygon points="250,110 251,113 254,113 252,115 253,118 250,116 247,118 248,115 246,113 249,113" fill="rgba(255,255,255,0.6)"/>
  <!-- Play button -->
  <circle cx="160" cy="80" r="15" fill="rgba(52,152,219,0.9)"/>
  <polygon points="156,73 156,87 169,80" fill="white"/>
  <text x="160" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Video 360 Spin</text>
</svg>
